<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification | Security Threshold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --bg-dark: #000814;
        }

        body {
            background: radial-gradient(circle at center, #0f2027, #0a1a2f, var(--bg-dark));
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--primary);
        }

        p {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 14px;
        }

        input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #0072ff);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        .message {
            color: #ff4757;
            margin-bottom: 20px;
            font-weight: 500;
        }

        #timer-container {
            margin-bottom: 25px;
            font-size: 13px;
            color: #8b949e;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        #timer-dots {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.4; transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔒 Security Verification</h2>
        <p>A medium-risk behavior was detected. Please enter the 6-digit OTP sent to your registered email.</p>
        
        {% if message %}
        <div class="message">{{ message }}</div>
        {% endif %}

        <div id="timer-container">
            <div id="timer-dots"></div>
            <span>OTP expires in: <strong id="timer">02:00</strong></span>
        </div>

        <form method="POST">
            <input type="text" name="otp" placeholder="000000" maxlength="6" required autofocus autocomplete="off">
            <button type="submit" class="btn">Verify Identity</button>
        </form>
        <a href="/" style="display: block; margin-top: 20px; color: #8b949e; text-decoration: none; font-size: 13px;">← Back to Login</a>
    </div>

    <script>
        // Set the expiry time from the session
        const expiryTimeStr = "{{ session.get('otp_expiry') }}";
        if (expiryTimeStr) {
            const expiryTime = new Date(expiryTimeStr).getTime();
            const timerDisplay = document.getElementById('timer');

            const countdown = setInterval(function() {
                const now = new Date().getTime();
                const distance = expiryTime - now;

                if (distance < 0) {
                    clearInterval(countdown);
                    timerDisplay.innerHTML = "EXPIRED";
                    timerDisplay.style.color = "#ff4757";
                    return;
                }

                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                timerDisplay.innerHTML = 
                    (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                    (seconds < 10 ? "0" + seconds : seconds);
                
                if (distance < 30000) { // Less than 30 seconds
                    timerDisplay.style.color = "#ff4757";
                }
            }, 1000);
        }
    </script>
</body>
</html>
