<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Locked | High Risk Detected</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --error: #ff4757;
            --bg-dark: #000814;
        }

        body {
            background: radial-gradient(circle at center, #1a0505, #0d0101, var(--bg-dark));
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(255, 71, 87, 0.2), inset 0 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 450px;
            border: 1px solid rgba(255, 71, 87, 0.3);
            animation: pulse 2s infinite alternate;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px var(--error));
        }

        h1 {
            color: var(--error);
            font-size: 28px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #8b949e;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .btn {
            background: var(--error);
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.5);
            background: #ff6b81;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 50px rgba(255, 71, 87, 0.2); }
            to { box-shadow: 0 0 70px rgba(255, 71, 87, 0.4); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        <h1>Access Denied</h1>
        <p>This account has been <strong>Locked</strong> due to high-risk behavior analysis or multiple failed authentication attempts.</p>
        <p>Your session has been terminated for security reasons.</p>
        <a href="/" class="btn" style="margin-top: 30px;">Return to Gateway</a>
    </div>
</body>
</html>
